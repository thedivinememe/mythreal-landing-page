<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome, Adventurer! — MythReal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #0D0D0D; color: #E8E0D0;
      font-family: 'Raleway', sans-serif; text-align: center;
      padding: 2rem;
    }
    .wrap { max-width: 500px; }
    h1 { font-family: 'Cinzel', serif; color: #C5A55A; font-size: 1.8rem; margin-bottom: 1rem; }
    p { line-height: 1.8; margin-bottom: 1.5rem; }
    a {
      display: inline-block; padding: 0.6rem 1.4rem;
      background: #C5A55A; color: #0D0D0D;
      font-family: 'Cinzel', serif; font-size: 0.8rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      text-decoration: none; border-radius: 3px;
    }
    a:hover { background: #dfc476; }

</head>
<body>
  <div class="wrap">
    <h1>Welcome, Adventurer!</h1>
